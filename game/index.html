# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#7f7f7f"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"


    bundle = "web"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/web
    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("web.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("web.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # TODO: test for window.webkitAudioContext and block aio loop until gesture if accessing media manager play
    # before a gesture is recorded ( touch or click )

    # test/wait user media interaction
    if not platform.window.MM.UME:

        # now that apk is mounted we have access to font cache
        # but we need to fill __file__ that is not yet set
        __import__(__name__).__file__ = main

        # now make a prompt
        msg  = "Ready to start ! Please click/touch page"
        platform.window.infobox.innerText = msg
        print("\n"*4, f"    * Waiting for media user engagement. {msg} *" , "\n"*4)

        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main


    def ui_callback(pkg):
        platform.window.infobox.innerText = f"installing {pkg}"

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

<script>
  (function() {
    /* ── Key dispatch (unchanged — proven reliable) ── */
    var CODE_MAP = {
      " ": "Space", "ArrowLeft": "ArrowLeft", "ArrowRight": "ArrowRight",
      "e": "KeyE", "Shift": "ShiftLeft", "Enter": "Enter"
    };
    var activeKeys = {};

    function dispatchKey(type, key, code) {
      if (type === "keydown" && activeKeys[code]) return;
      if (type === "keydown") activeKeys[code] = true;
      if (type === "keyup") delete activeKeys[code];
      var opts = {
        key: key, code: CODE_MAP[key] || key,
        keyCode: code, which: code,
        bubbles: true, cancelable: true
      };
      var evt = new KeyboardEvent(type, opts);
      window.dispatchEvent(evt);
      document.dispatchEvent(evt);
      document.body.dispatchEvent(evt);
      var canvas = document.querySelector("canvas");
      if (canvas) canvas.dispatchEvent(evt);
    }

    /* ── Fullscreen API ── */
    function goFullscreen() {
      var el = document.documentElement;
      var rfs = el.requestFullscreen || el.webkitRequestFullscreen ||
                el.mozRequestFullScreen || el.msRequestFullscreen;
      if (rfs) {
        try { rfs.call(el); } catch(e) {}
      }
      try {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(function(){});
        }
      } catch(e) {}
    }

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement ||
                document.mozFullScreenElement || document.msFullscreenElement);
    }

    var fsPrompt = document.getElementById("fs-prompt");
    if (fsPrompt) {
      fsPrompt.addEventListener("click", function() {
        goFullscreen();
        fsPrompt.classList.add("fs-hidden");
      });
      fsPrompt.addEventListener("touchend", function(e) {
        e.preventDefault();
        goFullscreen();
        fsPrompt.classList.add("fs-hidden");
      }, { passive: false });
    }

    /* Auto-fullscreen on landscape rotation */
    function onOrientationChange() {
      var isLandscape = window.innerWidth > window.innerHeight;
      var isMobile = "ontouchstart" in window || navigator.maxTouchPoints > 0;
      if (isLandscape && isMobile && !isFullscreen()) {
        goFullscreen();
        if (fsPrompt) fsPrompt.classList.add("fs-hidden");
      }
      // Lock to landscape on mobile when entering landscape
      if (isMobile && isLandscape && screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(function(){});
      }
    }
    window.addEventListener("orientationchange", function() {
      setTimeout(onOrientationChange, 300);
    });
    window.addEventListener("resize", function() {
      clearTimeout(window._fsResizeTimer);
      window._fsResizeTimer = setTimeout(onOrientationChange, 400);
    });
    /* Hide prompt once fullscreen is active */
    document.addEventListener("fullscreenchange", function() {
      if (isFullscreen() && fsPrompt) fsPrompt.classList.add("fs-hidden");
    });
    document.addEventListener("webkitfullscreenchange", function() {
      if (isFullscreen() && fsPrompt) fsPrompt.classList.add("fs-hidden");
    });

    /* ── Virtual Joystick ── */
    var joyZone = document.getElementById("joy-zone");
    var joyKnob = document.getElementById("joy-knob");
    var joyTouchId = null;
    var joyDir = 0; // -1 left, 0 neutral, 1 right

    function updateJoystick(touchX, touchY) {
      var rect = joyZone.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      var dx = touchX - cx;
      var dy = touchY - cy;
      var radius = rect.width / 2;
      var maxKnob = radius - 28;
      var dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > maxKnob) {
        dx = (dx / dist) * maxKnob;
        dy = (dy / dist) * maxKnob;
      }

      joyKnob.style.transform = "translate(calc(-50% + " + dx + "px), calc(-50% + " + dy + "px))";

      var deadzone = radius * 0.22;
      var newDir = 0;
      if (dx < -deadzone) newDir = -1;
      else if (dx > deadzone) newDir = 1;

      if (newDir !== joyDir) {
        if (joyDir === -1) dispatchKey("keyup", "ArrowLeft", 37);
        if (joyDir === 1)  dispatchKey("keyup", "ArrowRight", 39);
        if (newDir === -1)  dispatchKey("keydown", "ArrowLeft", 37);
        if (newDir === 1)   dispatchKey("keydown", "ArrowRight", 39);
        joyDir = newDir;
      }
    }

    function resetJoystick() {
      joyKnob.style.transform = "translate(-50%, -50%)";
      if (joyDir === -1) dispatchKey("keyup", "ArrowLeft", 37);
      if (joyDir === 1)  dispatchKey("keyup", "ArrowRight", 39);
      joyDir = 0;
      joyTouchId = null;
      joyZone.classList.remove("joy-active");
    }

    if (joyZone) {
      joyZone.addEventListener("touchstart", function(e) {
        e.preventDefault();
        if (joyTouchId !== null) return;
        var t = e.changedTouches[0];
        joyTouchId = t.identifier;
        joyZone.classList.add("joy-active");
        updateJoystick(t.clientX, t.clientY);
      }, { passive: false });

      joyZone.addEventListener("touchmove", function(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === joyTouchId) {
            updateJoystick(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            break;
          }
        }
      }, { passive: false });

      joyZone.addEventListener("touchend", function(e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === joyTouchId) {
            resetJoystick();
            break;
          }
        }
      }, { passive: false });

      joyZone.addEventListener("touchcancel", function() {
        resetJoystick();
      }, { passive: false });
    }

    /* ── A/B Buttons + START + DASH ── */
    var btnTouchMap = {};

    function findBtn(touch) {
      var el = document.elementFromPoint(touch.clientX, touch.clientY);
      return el && el.closest ? el.closest(".ab-btn, .tc-start") : null;
    }

    var container = document.getElementById("touch-controls");
    if (!container) return;

    container.addEventListener("touchstart", function(e) {
      if (e.target.closest && e.target.closest(".joy-zone")) return;
      if (e.target.closest && e.target.closest(".fs-prompt")) return;
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var btn = findBtn(t);
        if (btn && btn.dataset.key) {
          btnTouchMap[t.identifier] = btn;
          btn.classList.add("ab-pressed");
          dispatchKey("keydown", btn.dataset.key, parseInt(btn.dataset.code, 10));
        }
      }
    }, { passive: false });

    container.addEventListener("touchmove", function(e) {
      if (e.target.closest && e.target.closest(".joy-zone")) return;
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var prev = btnTouchMap[t.identifier];
        var curr = findBtn(t);
        if (prev && prev !== curr) {
          prev.classList.remove("ab-pressed");
          dispatchKey("keyup", prev.dataset.key, parseInt(prev.dataset.code, 10));
        }
        if (curr && curr !== prev && curr.dataset.key) {
          btnTouchMap[t.identifier] = curr;
          curr.classList.add("ab-pressed");
          dispatchKey("keydown", curr.dataset.key, parseInt(curr.dataset.code, 10));
        } else if (!curr) {
          delete btnTouchMap[t.identifier];
        }
      }
    }, { passive: false });

    function handleBtnEnd(e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var btn = btnTouchMap[t.identifier];
        if (btn) {
          btn.classList.remove("ab-pressed");
          dispatchKey("keyup", btn.dataset.key, parseInt(btn.dataset.code, 10));
          delete btnTouchMap[t.identifier];
        }
      }
    }
    container.addEventListener("touchend", handleBtnEnd, { passive: false });
    container.addEventListener("touchcancel", handleBtnEnd, { passive: false });

    /* ── Prevent unwanted gestures ── */
    document.addEventListener("gesturestart", function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener("gesturechange", function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener("contextmenu", function(e) {
      if (e.target && e.target.closest && e.target.closest("#touch-controls")) e.preventDefault();
    });
    document.addEventListener("touchmove", function(e) {
      if (e.target && e.target.closest && e.target.closest("#touch-controls")) e.preventDefault();
    }, { passive: false });

    /* Kick off initial check after a small delay */
    setTimeout(onOrientationChange, 1500);
  })();
</script>

</body>
</html>
